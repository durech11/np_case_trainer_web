<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NP Case Trainer{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}?v=4">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1><a href="/" style="text-decoration: none; color: var(--primary-color);">NP Case Trainer</a></h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/cases">Case Library</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Glossary Modal -->
    <div id="glossaryModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h3 id="glossaryTerm" style="margin: 0; color: var(--primary-color);">Term</h3>
                    <span id="glossaryCategory" class="badge diff-moderate" style="margin-top: 0.5rem; display: none;">Category</span>
                </div>
                <span class="close-btn" onclick="closeGlossary()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="glossaryDefinition">Loading...</p>

                <div id="glossaryInterpretationBox" style="display: none; margin-top: 1rem; padding: 0.8rem; background-color: rgba(25, 135, 84, 0.1); border-left: 4px solid #198754; border-radius: 4px;">
                    <strong>Interpretation:</strong>
                    <p id="glossaryInterpretation" style="margin: 0.5rem 0 0 0;"></p>
                </div>

                <div id="glossaryPearlBox" style="display: none; margin-top: 1rem; padding: 0.8rem; background-color: rgba(0, 86, 179, 0.05); border-left: 4px solid var(--primary-color); border-radius: 4px;">
                    <strong>💡 Clinical Pearl:</strong>
                    <p id="glossaryPearl" style="margin: 0.5rem 0 0 0;"></p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="warning-text"><strong>Educational Purpose Only:</strong> This application is for training and educational purposes. It does not provide medical advice, diagnosis, or treatment.</p>
        </div>
    </footer>

    <script src="{{ request.url_for('static', path='main.js') }}?v=4"></script>
</body>
</html>
