<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NP Case Trainer{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1><a href="/" style="text-decoration: none; color: var(--primary-color);">NP Case Trainer</a></h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/cases">Case Library</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p class="warning-text"><strong>Educational Purpose Only:</strong> This application is for training and educational purposes. It does not provide medical advice, diagnosis, or treatment.</p>
        </div>
    </footer>

    <script src="/static/main.js"></script>
</body>
</html>
