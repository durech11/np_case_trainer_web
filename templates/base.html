<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NP Case Trainer{% endblock %}</title>
    <!-- HTMX for dynamic interactions without heavy frontend frameworks -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1>NP Case Trainer</h1>
            <nav>
                <a href="/">Dashboard</a>
                <span style="opacity: 0.5; margin-left: 1rem; cursor: not-allowed;" title="Coming soon">Case Library</span>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p class="warning-text"><strong>Educational Purpose Only:</strong> This application is for training and educational purposes. It does not provide medical advice, diagnosis, or treatment.</p>
        </div>
    </footer>

    <script src="/static/main.js"></script>
</body>
</html>
